version: "3.8"

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:-change-me-in-production}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-change-me-in-production}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:8081}
      - DATABASE_URL=${DATABASE_URL:-file:./data/data.db}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - data:/app/data
    restart: unless-stopped

volumes:
  data: